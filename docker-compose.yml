services:
  # --- NeMo Guardrails (Aegis P12 secondary scanner) ---
  # Runs on 8001 to avoid conflict with the Arcturus backend on 8000.
  # Requires a rails config under ./config/nemo/ (see safety/nemo_guardrails.py).
  # Uncomment to activate:
  #
  # nemo-guardrails:
  #   image: python:3.11-slim
  #   container_name: arcturus-nemo-guardrails
  #   ports:
  #     - "8001:8001"
  #   volumes:
  #     - ./config/nemo:/app/config
  #   working_dir: /app
  #   command: >
  #     sh -c "pip install nemoguardrails --quiet &&
  #            nemoguardrails server --config ./config --port 8001 --host 0.0.0.0"
  #   environment:
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #   restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: arcturus-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      # Persist data to local directory
      - ./data/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongodb:
    image: mongo:7
    container_name: arcturus-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongodb:/data/db
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: arcturus-jaeger
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP HTTP
    restart: unless-stopped

