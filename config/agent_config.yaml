agents:
  ManagerAgent:
    model: gemini
    mcp_servers: []
    skills:
      - manager
    description: Receives a user request and decomposes it into a DAG of sub-tasks for Worker Agents
  PlannerAgent:
    model: gemini
    mcp_servers: []
    skills:
    - planner
    - deep_research
    - web_clipper
    - research_scientist
    - agent-manager-skill
    - startup-business-analyst-market-opportunity
    description: Generates the execution plan graph.
  BrowserAgent:
    model: gemini
    mcp_servers:
    - browser
    skills:
    - browser
    - browser-extension-builder
    description: Browses the web using text search or vision.
  CoderAgent:
    model: gemini
    mcp_servers:
    - sandbox
    - browser
    - rag
    - yahoo_finance
    skills:
    - coder
    - python_coding
    - debugging
    - git_commit
    - firecrawl-scraper
    description: |
      Executes Python code for computation, data analysis, file manipulation, and chart generation.
      Use ONLY for tasks requiring code execution (calculations, data transforms, plotting).
      Do NOT use for web searches or data retrieval — use RetrieverAgent instead.
  RetrieverAgent:
    model: gemini
    mcp_servers:
    - rag
    - browser
    - yahoo_finance
    skills:
    - retriever
    description: |
      Fetches data from web searches, URLs, documents, RAG, and yahoo_finance tools.
      Use for ALL web search, content extraction, and data retrieval tasks.
      This is the primary agent for gathering external information.
  SummarizerAgent:
    model: gemini
    mcp_servers:
    - browser
    - rag
    skills:
    - summarizer
    description: |
      Synthesizes gathered data into comprehensive narratives with inline citations.
      Use after data retrieval to merge multiple sources into a cohesive answer.
  DistillerAgent:
    model: gemini
    mcp_servers: []
    skills:
    - distiller
    description: Condenses long text into concise bullet-point summaries.
  ThinkerAgent:
    model: gemini
    mcp_servers: []
    skills:
    - thinker
    description: |
      Performs logical reasoning, comparison, gap analysis, query decomposition, and clustering.
      Use for analysis tasks that require reasoning but no code execution or data retrieval.
  FormatterAgent:
    model: gemini
    mcp_servers: []
    skills:
    - formatter
    description: |
      Beautifies final outputs into human-readable formats (Markdown, HTML, tables).
  ClarificationAgent:
    model: gemini
    mcp_servers: []
    skills:
    - clarification
    description: Queries human or confirms ambiguous steps.
  QAAgent:
    model: gemini
    mcp_servers: []
    skills:
    - qa
    description: |
      Reviews and critiques final or interim products.
  TestAgent:
    model: ollama
    mcp_servers: []
    skills:
    - test_agent
    description: Generates Pytest tests for Python code.
  DebuggerAgent:
    model: ollama
    mcp_servers: []
    skills:
    - debugger_agent
    description: Fixes code based on test failures.
  SchedulerAgent:
    model: gemini
    mcp_servers: []
    skills:
    - scheduler
    description: Defines time-aware or trigger-bound execution.
  IDEAgent:
    model: gemini
    mcp_servers:
    - rag
    - sandbox
    - browser
    - git
    skills:
    - coder
    - python_coding
    - debugging
    description: Specialized workspace assistant for deep code analysis and interactive debugging.
  SafetyAgent:
    model: gemini
    mcp_servers: []
    skills: []
    description: |
      Reviews outputs for safety, policy, and content guidelines.
